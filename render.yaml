services:
  - type: web
    name: piaseg-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    filter:
      paths:
        - backend/**
    disk:
      name: piaseg-data
      mountPath: /data
      sizeGB: 2
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PDF_FOLDER_PATH
        value: /data/pdfs
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
